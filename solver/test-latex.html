<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaTeX渲染测试</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- markdown-it for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <!-- KaTeX for fast math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/contrib/auto-render.min.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-4">LaTeX渲染测试</h1>
        
        <div class="mb-6">
            <h2 class="text-xl font-semibold mb-2">测试内容</h2>
            <textarea id="latex-input" class="w-full h-64 p-4 border border-gray-300 rounded-lg" placeholder="请输入包含LaTeX公式的内容...">
已知正六边形 (ABCDEF)，边长 (AB = 2)，求向量 (\overrightarrow{AB} + \overrightarrow{AF} + \overrightarrow{CD}) 的模长。

步骤1：建立坐标系与各点坐标
为了方便，将正六边形 (ABCDEF) 放在平面直角坐标系中，中心在原点 (O)，且 (AB) 水平向右。
正六边形的顶点顺序为 (A,B,C,D,E,F) 逆时针排列，边长 (a=2)。
中心到每个顶点的距离（外接圆半径） (R = a = 2)。

顶点坐标（从 (A) 开始逆时针）：

设 (A = (2, 0))
外接圆半径 (R=2)，相邻顶点夹角 (60^\circ)。
(B)：从 (A) 逆时针转 (60^\circ)？不对，注意 (A) 在正六边形中位置。
更常用的放法：让 (A) 在 ((R,0))，逆时针转 (60^\circ) 得下一个顶点。
顶点依次：
(A = (2,0))
(B = (2\cos 60^\circ, 2\sin 60^\circ) = (1, \sqrt{3}))
(C = (-1, \sqrt{3}))
(D = (-2, 0))
(E = (-1, -\sqrt{3}))
(F = (1, -\sqrt{3}))
检查：(AB) 长度：
[ AB = \sqrt{(1-2)^2 + (\sqrt{3}-0)^2} = \sqrt{1 + 3} = 2 ] 符合。

步骤2：写出所需向量
[ \overrightarrow{AB} = B - A = (1-2, \sqrt{3} - 0) = (-1, \sqrt{3}) ] 
[ \overrightarrow{AF} = F - A = (1-2, -\sqrt{3} - 0) = (-1, -\sqrt{3}) ] 
[ \overrightarrow{CD} = D - C = (-2 - (-1), 0 - \sqrt{3}) = (-1, -\sqrt{3}) ]

步骤3：向量相加
[ \overrightarrow{AB} + \overrightarrow{AF} + \overrightarrow{CD} = (-1, \sqrt{3}) + (-1, -\sqrt{3}) + (-1, -\sqrt{3}) ] 
先算前两个： 
[ (-1, \sqrt{3}) + (-1, -\sqrt{3}) = (-2, 0) ] 
再加第三个 ((-1, -\sqrt{3}))： 
[ (-2, 0) + (-1, -\sqrt{3}) = (-3, -\sqrt{3}) ]

步骤4：求模长
[ |(-3, -\sqrt{3})| = \sqrt{(-3)^2 + (-\sqrt{3})^2} = \sqrt{9 + 3} = \sqrt{12} = 2\sqrt{3} ]

答案总结
[ \boxed{2\sqrt{3}} ]
</textarea>
        </div>
        
        <button id="render-btn" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">
            渲染LaTeX
        </button>
        
        <div class="mt-6">
            <h2 class="text-xl font-semibold mb-2">渲染结果</h2>
            <div id="rendered-output" class="p-4 border border-gray-300 rounded-lg min-h-64"></div>
        </div>
    </div>

    <script>
        document.getElementById('render-btn').addEventListener('click', function() {
            const latexText = document.getElementById('latex-input').value;
            const outputDiv = document.getElementById('rendered-output');
            
            // 先使用markdown-it渲染
            if (typeof window.markdownit === 'function') {
                const md = window.markdownit({
                    html: true,
                    linkify: true,
                    typographer: true
                });
                
                const renderedMarkdown = md.render(latexText);
                outputDiv.innerHTML = renderedMarkdown;
                
                // 然后使用KaTeX渲染数学公式
                if (typeof renderMathInElement !== 'undefined') {
                    try {
                        renderMathInElement(outputDiv, {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$', right: '$', display: false},
                                {left: '[', right: ']', display: true}
                            ],
                            throwOnError: false
                        });
                        console.log('LaTeX rendering completed successfully');
                    } catch (error) {
                        console.error('Error rendering LaTeX:', error);
                        outputDiv.innerHTML += '<p class="text-red-500 mt-2">LaTeX渲染出错，请查看控制台</p>';
                    }
                } else {
                    console.error('renderMathInElement not available');
                    outputDiv.innerHTML += '<p class="text-red-500 mt-2">KaTeX auto-render not loaded</p>';
                }
            } else {
                console.error('markdown-it not available');
                outputDiv.innerHTML = '<p class="text-red-500">markdown-it not loaded</p>';
            }
        });
        
        // 页面加载完成后自动渲染一次
        window.addEventListener('load', function() {
            console.log('Page loaded, checking libraries...');
            console.log('markdown-it available:', typeof window.markdownit === 'function');
            console.log('KaTeX available:', typeof katex !== 'undefined');
            console.log('renderMathInElement available:', typeof renderMathInElement !== 'undefined');
            
            document.getElementById('render-btn').click();
        });
    </script>
</body>
</html>
